# Run `uv run pre-commit install` once to enable the git hook.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        name: Check for large files
      - id: check-ast
        name: Check Python AST syntax
      - id: check-case-conflict
        name: Check filename case conflicts
      - id: check-executables-have-shebangs
        name: Check executables have shebangs
      - id: check-json
        name: Check JSON syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-yaml
        name: Check YAML syntax
      - id: check-merge-conflict
        name: Check for merge conflict markers
      - id: check-shebang-scripts-are-executable
        name: Check shebang scripts are executable
      - id: debug-statements
        name: Check for debug statements
      - id: detect-private-key
        name: Detect private keys
        exclude: \.env\.example$
      - id: end-of-file-fixer
        name: Fix end of files
      - id: no-commit-to-branch
        name: Prevent commits to protected branches
        args: [--branch, master, --branch, deploy]
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]
      - id: trailing-whitespace
        name: Trim trailing whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        name: Lint (ruff check)
        args: [--fix]
      - id: ruff-format
        name: Format (ruff format)

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.18
    hooks:
      - id: uv-lock
        name: Check uv.lock is in sync
      - id: uv-export
        name: Export requirements.txt
        args:
          - "--frozen"
          - "--output-file=requirements.txt"
          - "--no-default-groups"
          - "--quiet"
          - "--no-annotate"
          - "--no-hashes"
          - "--no-header"
        files: ^uv\.lock$
      - id: uv-export
        name: Export requirements.dev.txt
        args:
          - "--frozen"
          - "--output-file=requirements.dev.txt"
          - "--all-groups"
          - "--quiet"
          - "--no-annotate"
          - "--no-hashes"
          - "--no-header"
        files: ^uv\.lock$
