services:
  db:
    image: postgres:18-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${MY_APP__DB__USERNAME}
      POSTGRES_PASSWORD: ${MY_APP__DB__PASSWORD}
      POSTGRES_DB: ${MY_APP__DB__NAME}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MY_APP__DB__USERNAME} -d ${MY_APP__DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migration
    env_file: .env
    environment:
      MY_APP__DB__HOST: db
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: app
    env_file: .env
    environment:
      MY_APP__DB__HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
